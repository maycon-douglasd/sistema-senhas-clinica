<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="./src/img/favicon.png">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/estilos.css">
    <link rel="stylesheet" href="./src/css/print.css">
    <link rel="stylesheet" href="./src/css/responsivo.css">


    <title>Totem UBS</title>
</head>

<body>

    <section class="container">

        <div id="cabecalho">
            <h1>🏥 UBS MUNICIPAL</h1>

            <p>Sistema de Emissão de Senhas</p>
        </div>

        <!-- TELA 1 -->
        <div id="telaSetores">

            <button onclick="selecionarSetor('DEN', 'Dentista')">
                Dentista
            </button>

            <button onclick="selecionarSetor('ENF', 'Enfermeiro')">
                Enfermeiro
            </button>

            <button onclick="selecionarSetor('FAR', 'Farmácia')">
                Farmácia
            </button>

            <button onclick="selecionarSetor('MED', 'Médico')">
                Médico
            </button>

            <button onclick="selecionarSetor('VAC', 'Vacinas')">
                Vacinas
            </button>

        </div>

        <!-- TELA 2 -->
        <div id="telaTipoSenha">

            <h2 id="nomeSetor"></h2>

            <button id="btnNormal" onclick="senhaNormal()">
                Normal
            </button>

            <button id="btnPreferencial" onclick="senhaPreferencial()">
                Preferencial
            </button>            

        </div>

        <div id="senha"></div>

    </section>

    <script src="./src/js/index.js"></script>

</body>

</html>
